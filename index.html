<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object</title>

    <style>
        body{
            background-color: darkslategray;
            color: white;
            font-family: sans-serif;
        }
        button {
            padding: .25rem 1rem;
            width: 7rem;
            font-weight: bold;
            font-family: sans-serif;
            border-color: white;
            background-color: darkslategrey;
            color: white;
            font-size: 2rem;
            border-radius: 50%;
        }
        button#x{
            padding: .25rem 1rem;
            width: 7.5rem;
            font-weight: bold;
            font-family: sans-serif;
            border-color: white;
            background-color: darkslategrey;
            color: white;
            font-size: 1rem;
            border-radius: 50%;
            margin-left: 3rem;
        }
        button#x:hover{
            background-color: white;
            color: darkslategray;
            border-color: darkslategray;
        }
        button:hover{
            background-color: white;
            color: darkslategray;
            border-color: darkslategray;
        }
    </style>
</head>
<body>
    <h1 id="result">Chose one!</h1>

    <button id="head" onclick="
        playGame('head')
    ">Head</button>
    <button id="tail" onclick="
        playGame('tail')
    ">Tail</button>
    
    <h3 id="state"></h3>
    <h2 id="bord"></h2>
    <button id="x" onclick="
        reset();
    ">Reset Score</button>



    <script src="main.js"></script>
</body>
</html>
